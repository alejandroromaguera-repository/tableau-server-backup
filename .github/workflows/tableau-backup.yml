name: Backup Tableau Server → GitHub

on:
  schedule:
    # Ejecutar diariamente a las 2 AM (UTC)
    - cron: '0 2 * * *'
  
  # También permitir ejecución manual
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Descargar workbooks de Tableau Server
        env:
          TABLEAU_SERVER: ${{ secrets.TABLEAU_SERVER }}
          TABLEAU_SITE: ${{ secrets.TABLEAU_SITE }}
          TABLEAU_USERNAME: ${{ secrets.TABLEAU_USERNAME }}
          TABLEAU_PASSWORD: ${{ secrets.TABLEAU_PASSWORD }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tableau_server_sync.py
      
      - name: Cargar artefactos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tableau-workbooks-backup
          path: tableau_workbooks/
          retention-days: 30
