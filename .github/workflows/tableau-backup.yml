name: Tableau Backup → GitHub

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Ejecutar backup
        env:
          TABLEAU_SERVER: ${{ secrets.TABLEAU_SERVER }}
          TABLEAU_SITE: ${{ secrets.TABLEAU_SITE }}
          TABLEAU_USERNAME: ${{ secrets.TABLEAU_USERNAME }}
          TABLEAU_PASSWORD: ${{ secrets.TABLEAU_PASSWORD }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tableau_backup.py
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tableau-backup
          path: tableau_workbooks/
          retention-days: 30
